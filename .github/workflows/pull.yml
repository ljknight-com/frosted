# Runs on Depot managed runners (depot.dev). Requires the Depot GitHub app to be
# installed and configured for this org: https://depot.dev/docs/github-actions/quickstart
name: PR

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: pr-action-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint repository
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run eslint
        run: bun x eslint ./ --max-warnings 0
      - name: Run stylelint
        run: bun x turbo lint:css

  typecheck:
    name: Typecheck packages
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun x turbo typecheck

  build:
    name: Build packages
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun x turbo build

  test:
    name: Test repository
    needs: build
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun x turbo test

  package-health:
    name: Package health (@aussieljk/frosted)
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build @aussieljk/frosted
        run: bun x turbo build --filter=@aussieljk/frosted
      - name: publint + Are the types wrong?
        run: bun run health
        working-directory: packages/frosted-ui
